name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/aistudio/cointap/qpksmx
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/test/java/com/aistudio/cointap/qpksmx
          mkdir -p app/src/androidTest/java/com/aistudio/cointap/qpksmx
          mkdir -p gradle/wrapper

          for f in MainActivity AppDatabase Color GameRepository \
                   GameStats GameStatsDao GameViewModel \
                   SoundManager Theme Type; do
            [ -f "${f}.kt" ] && \
              cp "${f}.kt" app/src/main/java/com/aistudio/cointap/qpksmx/
          done

          for f in ExampleUnitTest ExampleRobolectricTest \
                   GreetingScreenshotTest; do
            [ -f "${f}.kt" ] && \
              cp "${f}.kt" app/src/test/java/com/aistudio/cointap/qpksmx/
          done
          [ -f ExampleInstrumentedTest.kt ] && \
            cp ExampleInstrumentedTest.kt \
            app/src/androidTest/java/com/aistudio/cointap/qpksmx/

          [ -f AndroidManifest.xml ] && cp AndroidManifest.xml app/src/main/
          [ -f strings.xml ]  && cp strings.xml  app/src/main/res/values/
          [ -f colors.xml ]   && cp colors.xml   app/src/main/res/values/
          [ -f themes.xml ]   && cp themes.xml   app/src/main/res/values/
          [ -f backup_rules.xml ] && \
            cp backup_rules.xml app/src/main/res/xml/
          [ -f data_extraction_rules.xml ] && \
            cp data_extraction_rules.xml app/src/main/res/xml/

          for f in ic_launcher.xml ic_launcher_round.xml \
                   ic_launcher_background.xml ic_launcher_foreground.xml; do
            [ -f "$f" ] && cp "$f" app/src/main/res/drawable/
          done
          find . -maxdepth 1 \( -name "*.jpg" -o -name "*.png" \
            -o -name "*.webp" \) \
            -exec cp {} app/src/main/res/drawable/ \; 2>/dev/null || true

          [ -f build.gradle.kts ]   && cp build.gradle.kts app/build.gradle.kts
          [ -f proguard-rules.pro ] && cp proguard-rules.pro app/
          [ -f libs.versions.toml ] && cp libs.versions.toml gradle/

          echo "=== Structure ===" && find app/src -type f | sort

      - name: Create root build.gradle.kts
        run: |
          cat > build.gradle.kts << 'EOF'
          plugins {
              alias(libs.plugins.android.application) apply false
              alias(libs.plugins.kotlin.compose) apply false
              alias(libs.plugins.google.devtools.ksp) apply false
              alias(libs.plugins.roborazzi) apply false
              alias(libs.plugins.secrets) apply false
          }
          EOF

      - name: Setup local.properties and env
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          touch .env
          printf "KEYSTORE_PATH=\nSTORE_PASSWORD=\nKEY_PASSWORD=\n" \
            > .env.example

      - name: Create google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "tapcoin-debug",
              "storage_bucket": "tapcoin-debug.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:abc123def456",
                "android_client_info": {
                  "package_name": "com.aistudio.cointap.qpksmx"
                }
              },
              "oauth_client": [],
              "api_key": [{"current_key": "debug-key"}],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }],
            "configuration_version": "1"
          }
          EOF

      - name: Setup Gradle 9.3.1 wrapper
        run: |
          GRADLE_VER="9.3.1"
          curl -sL \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-${GRADLE_VER}/bin/gradle wrapper \
            --gradle-version=${GRADLE_VER} --distribution-type=bin
          chmod +x gradlew
          echo "Gradle wrapper ready ✅"

      - name: Fix app/build.gradle.kts
        run: |
          python3 << 'PYEOF'
          import re

          with open('app/build.gradle.kts', 'r') as f:
              content = f.read()

          lines = content.split('\n')
          result = []
          skip = False
          depth = 0

          for line in lines:
              stripped = line.strip()

              # Fix compileSdk block syntax
              if not skip and re.match(r'compileSdk\s*\{', stripped):
                  pad = len(line) - len(line.lstrip())
                  result.append(' ' * pad + 'compileSdk = 36')
                  continue

              # Skip signingConfigs and secrets blocks
              if not skip and (
                  re.match(r'signingConfigs\s*\{', stripped) or
                  re.match(r'secrets\s*\{', stripped)
              ):
                  skip = True
                  depth = line.count('{') - line.count('}')
                  continue

              if skip:
                  depth += line.count('{') - line.count('}')
                  if depth <= 0:
                      skip = False
                  continue

              # Remove signingConfig reference lines
              if 'signingConfig' in line and 'signingConfigs' in line:
                  continue

              # Remove secrets/roborazzi plugin aliases from app plugins block
              if re.search(r'alias\(libs\.plugins\.(secrets|roborazzi)\)', line):
                  continue

              result.append(line)

          with open('app/build.gradle.kts', 'w') as f:
              f.write('\n'.join(result))

          print("app/build.gradle.kts fixed ✅")
          PYEOF

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -x test \
            -x connectedAndroidTest \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TapCoinEmpire-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
